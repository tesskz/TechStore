<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TechStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="nav-container">
        <h1 class="logo">⚙️ TechStore Admin</h1>
        <nav class="nav-links">
            <a href="index.html" class="nav-btn">Boutique</a>
            <a href="#" class="nav-btn" onclick="logoutUser()">Déconnexion</a>
        </nav>
    </div>
</header>

<main>

    <!-- Ajouter un produit -->
    <div class="admin-container">
        <h2>➕ Ajouter un produit</h2>
        <form id="admin-form">
            <input type="text"   id="product-name"     placeholder="Nom du produit"  required>
            <input type="number" id="product-price"    placeholder="Prix (€)" step="0.01" min="0" required>
            <input type="text"   id="product-img"      placeholder="URL de l'image (optionnel)">
            <select id="product-platform" required>
                <option value="">🎮 Plateforme du code jeu</option>
                <option value="Steam">Steam</option>
                <option value="Epic Games">Epic Games</option>
                <option value="Microsoft Store">Microsoft Store</option>
                <option value="Ubisoft Connect">Ubisoft Connect</option>
                <option value="EA App">EA App</option>
                <option value="Battle.net">Battle.net</option>
                <option value="Rockstar Games">Rockstar Games</option>
                <option value="GOG">GOG</option>
                <option value="PlayStation Store">PlayStation Store</option>
                <option value="Xbox Live">Xbox Live</option>
                <option value="Nintendo eShop">Nintendo eShop</option>
            </select>
            <input type="text" id="product-code" placeholder="🔑 Code d'activation (ex: XXXXX-XXXXX-XXXXX)" required>
            <button type="submit">Ajouter le produit</button>
        </form>
        <p id="admin-message"></p>
    </div>

    <!-- Liste des produits -->
    <div class="admin-container">
        <h2>📋 Produits en catalogue</h2>
        <div id="admin-products-list">
            <p>Chargement…</p>
        </div>
    </div>

</main>

<script src="js/api.js"></script>
<script src="js/script.js"></script>
<script>
    // ─── Vérification admin ───────────────────
    const token = getToken();
    const user  = getCurrentUser();

    if (!token || !user || user.role !== 'admin') {
        alert('Accès réservé aux administrateurs.');
        window.location.href = 'connexion.html';
    }

    const msg = document.getElementById('admin-message');

    // ─── Charger la liste des produits ────────
    async function loadAdminProducts() {
        const list = document.getElementById('admin-products-list');
        const products = await fetchProducts();
        list.innerHTML = '';

        if (!products.length) {
            list.innerHTML = '<p>Aucun produit.</p>';
            return;
        }

        products.forEach(prod => {
            const div = document.createElement('div');
            div.className = 'admin-product-row';
            div.innerHTML = `
                <img src="${prod.img}" alt="${prod.name}" width="50" height="50" style="border-radius:8px;object-fit:cover">
                <span><strong>${prod.name}</strong> — ${parseFloat(prod.price).toFixed(2)} €
                    ${prod.platform ? `<span class="platform-badge">${prod.platform}</span>` : ''}
                    ${prod.activation_code ? `<br><code class="activation-code">🔑 ${prod.activation_code}</code>` : ''}
                </span>
                <button class="delete-btn" onclick="handleDeleteProduct(${prod.id}, '${prod.name}')">
                    🗑️ Supprimer
                </button>
            `;
            list.appendChild(div);
        });
    }

    // ─── Ajouter un produit ───────────────────
    document.getElementById('admin-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name     = document.getElementById('product-name').value;
        const price    = document.getElementById('product-price').value;
        const img      = document.getElementById('product-img').value;
        const platform = document.getElementById('product-platform').value;
        const code     = document.getElementById('product-code').value;

        const result = await addProduct(name, price, img, platform, code);

        if (result.product) {
            msg.textContent = '✅ ' + result.message;
            msg.style.color = 'green';
            this.reset();
            loadAdminProducts();
        } else {
            msg.textContent = '❌ ' + (result.message || 'Erreur.');
            msg.style.color = 'red';
        }
    });

    // ─── Supprimer un produit ─────────────────
    async function handleDeleteProduct(id, name) {
        if (!confirm(`Supprimer "${name}" ?`)) return;
        const result = await deleteProduct(id);
        msg.textContent = result.message || 'Supprimé.';
        msg.style.color = result.message?.includes('supprimé') ? 'green' : 'red';
        loadAdminProducts();
    }

    // ─── Lancement ────────────────────────────
    loadAdminProducts();
</script>

</body>
</html>
