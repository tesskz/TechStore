<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier - TechStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="nav-container">
        <h1 class="logo">🛒 Mon panier</h1>
        <nav class="nav-links">
            <a href="index.html" class="nav-btn">← Boutique</a>
            <a href="commandes.html" class="nav-btn">📦 Mes commandes</a>
            <a href="connexion.html" class="nav-btn">Se connecter</a>
        </nav>
    </div>
</header>

<main>
    <h2>Articles :</h2>
    <div id="cart-items"></div>
    <h3>Total : <span id="total">0 €</span></h3>
    <div class="cart-actions">
        <a href="checkout.html" id="checkout-btn" class="checkout-link">💳 Commander</a>
        <button id="clear-cart" class="clear-btn" style="width:auto;padding:10px 20px">
            🗑️ Vider le panier
        </button>
    </div>
    <p id="guest-notice" style="display:none; color:#777; margin-top:15px; font-size:14px">
        💡 <a href="connexion.html">Connectez-vous</a> pour sauvegarder votre panier.
    </p>
</main>

<script src="js/api.js"></script>
<script src="js/script.js"></script>
<script>
    // Afficher le message si pas connecté
    if (!getToken()) {
        document.getElementById('guest-notice').style.display = 'block';
    }
</script>

</body>
</html>
